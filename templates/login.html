<!DOCTYPE html>
<html lang="en">
<head>
<title>Login</title>

<style>
body {
    background: linear-gradient(135deg,#0f172a,#1e293b);
    font-family: 'Segoe UI', sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box {
    background:white;
    padding:30px;
    border-radius:12px;
    width:300px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

input {
    width:100%;
    padding:10px;
    margin:10px 0;
}

button {
    width:100%;
    padding:10px;
    background:#3b82f6;
    color:white;
    border:none;
}
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button>Login</button>
</form>

</div>

</body>
</html>
