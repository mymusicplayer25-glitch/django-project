<!DOCTYPE html>
<html lang="en">
<head>

<style>

    margin:0;
    font-family: Arial, sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
}

.nav {
    display:flex;
    justify-content:space-between;
    padding:20px;
}

.hero {
    display:flex;
    justify-content:space-between;
    padding:80px;
}

button {
    padding:12px 20px;
    margin-top:10px;
    border:none;
    background:#3b82f6;
    color:white;
    border-radius:6px;
}
</style>
</head>

<body>

<div class="nav">
    <b>MyStore</b>

    <div>
        <a href="/login/">Login</a>
        <a href="/register/">Register</a>
    </div>
</div>

<div class="hero">
    <div>
        <h1>Welcome to My Store 🚀</h1>
        <p>Best way to buy your needs</p>

        <a href="/shop/">
            <button>Start Shopping</button>
        </a>
    </div>
</div>

</body>
</html>
